name: CI

on:
  push:
    branches: [ main, "feat/**" ]
  pull_request:
  workflow_dispatch:

jobs:
  # Cross-platform unit tests (fast, no Windows needed).
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest
      - name: Unit tests
        run: python -m pytest -q
      - name: Syntax check
        run: python -m py_compile find_suspicious_dlls.py

  # Real Windows run: exercises psutil enumeration, PowerShell signature checks,
  # hijack detection and report writing against actual loaded DLLs on a Windows box.
  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest
      - name: Unit tests (Windows)
        run: python -m pytest -q
      - name: Live scan smoke test
        shell: pwsh
        run: |
          # Start from a clean reports dir so we verify THIS run's output.
          Remove-Item reports\* -Include *.txt,*.csv -Force -ErrorAction SilentlyContinue
          python find_suspicious_dlls.py --max 5
      - name: Confirm a fresh report was produced
        shell: pwsh
        run: |
          $report = Get-ChildItem reports -Filter *.txt |
                    Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $report) { throw "No report file was generated" }
          if ($report.LastWriteTime -lt (Get-Date).AddMinutes(-10)) {
            throw "Report is stale ($($report.Name)); the live scan did not write a new one"
          }
          Write-Host "Fresh report generated: $($report.Name)"
          Get-Content $report.FullName -TotalCount 25
      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-scan-report
          path: reports/
